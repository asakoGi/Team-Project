<!DOCTYPE html>
<!-- HTMLは構造のみを担当します。見た目はstyle.css、動きはscript.jsで管理します -->
<html lang="ja">
<head>
    <!-- 文字コードの指定。日本語が文字化けしないようにするため -->
    <meta charset="UTF-8">
    <!-- スマホやタブレットでも見やすくするための設定 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- ブラウザのタブに表示されるタイトル -->
    <title>AIパスポート ToDo管理アプリ</title>
    <!-- 外部CSSファイル(style.css)を読み込む -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ====== トップバー ====== -->
    <!-- ページ上部に常に表示されるバー。今は中身は空にしておく(ページ追加時に使う) -->
    <header class="topbar">
        <!-- 後でロゴやメニューを追加できるようにするための空のスペース -->
    </header>

    <!-- ====== サイドバー ====== -->
    <!-- ページ左側に表示されるバー。今は中身は空にしておく(ページ追加時に使う) -->
    <aside class="sidebar">
        <!-- 後でメニューやリンクを追加できるようにするための空のスペース -->
    </aside>

    <!-- ====== メインコンテンツ ====== -->
    <!-- ToDo管理の本体部分。1ページに全機能をまとめている -->
    <main class="main">

        <!-- ページ全体のタイトル -->
        <h1 class="page-title">AIパスポート ToDo管理アプリ</h1>

        <!-- ====== タスク入力エリア ====== -->
        <!-- ユーザーが新しいタスクを入力するためのエリア -->
        <section class="task-input-area">
            <h2 class="section-title">タスク入力</h2>

            <!-- タスクのタイトル入力 -->
            <div class="input-group">
                <label class="input-label" for="taskTitle">タスク（タイトル）</label>
                <!-- ユーザーがタスク名を打ち込む箱 -->
                <input type="text" id="taskTitle" class="task-title-input" placeholder="タスクを入力してください">
            </div>

            <!-- プロパティ入力エリア -->
            <div class="property-area">
                <h3 class="property-title">プロパティ入力</h3>

                <!-- 実行日の入力 -->
                <div class="property-row">
                    <span class="property-label">📅 実行日</span>
                    <input type="date" id="executeDate" class="property-input">
                </div>

                <!-- 実行時間の入力 (タイムラインで使うため追加) -->
                <div class="property-row">
                    <span class="property-label">⏰ 実行時間</span>
                    <input type="time" id="executeTime" class="property-input">
                </div>

                <!-- 期限の入力 -->
                <div class="property-row">
                    <span class="property-label">🕐 期限</span>
                    <input type="date" id="deadlineDate" class="property-input">
                </div>

                <!-- 章の選択 (「その他」カテゴリを追加) -->
                <div class="property-row">
                    <span class="property-label">📖 章</span>
                    <select id="chapterSelect" class="property-input">
                        <option value="">章を選択</option>
                        <option value="1">1章</option>
                        <option value="2">2章</option>
                        <option value="3">3章</option>
                        <option value="4">4章</option>
                        <option value="5">5章</option>
                        <option value="other">その他（テキスト以外のタスク）</option>
                    </select>
                </div>

                <!-- セクションの選択 -->
                <div class="property-row">
                    <span class="property-label">📚 セクション</span>
                    <select id="sectionSelect" class="property-input">
                        <option value="">セクションを選択</option>
                        <option value="1">セクション1</option>
                        <option value="2">セクション2</option>
                        <option value="3">セクション3</option>
                        <option value="4">セクション4</option>
                        <option value="5">セクション5</option>
                    </select>
                </div>

                <!-- タスクの大きさの選択 -->
                <div class="property-row">
                    <span class="property-label">📊 タスクの大きさ</span>
                    <select id="taskSize" class="property-input">
                        <option value="">サイズを選択</option>
                        <option value="small">小</option>
                        <option value="medium">中</option>
                        <option value="large">大</option>
                    </select>
                </div>

                <!-- タスクを追加するボタン -->
                <button type="button" id="addTaskButton" class="add-button">タスクを追加</button>
            </div>
        </section>

        <!-- ====== ダッシュボードエリア ====== -->
        <!-- タスク一覧、カレンダー、タイムラインをまとめて表示するエリア -->
        <section class="dashboard">

            <!-- ====== タスク一覧エリア ====== -->
            <!-- 章ごと + その他カテゴリに分類されたタスクを表示する -->
            <div class="task-list-area">
                <h2 class="section-title">タスク一覧</h2>
                <!-- 章ごとのタスクをここに表示する。中身はscript.jsで自動生成される -->
                <div id="taskList" class="task-list"></div>
            </div>

            <!-- ====== カレンダーとタイムラインのエリア ====== -->
            <div class="right-panel">

                <!-- カレンダー(1か月分) -->
                <div class="calendar-area">
                    <h2 class="section-title">カレンダー（1か月）</h2>
                    <!-- カレンダーの上部(月の表示と前後ボタン) -->
                    <div class="calendar-header">
                        <button type="button" id="prevMonth" class="calendar-nav-button">&lt;</button>
                        <span id="calendarTitle" class="calendar-title">2024年6月</span>
                        <button type="button" id="nextMonth" class="calendar-nav-button">&gt;</button>
                    </div>
                    <!-- カレンダー本体。中身はscript.jsで自動生成される -->
                    <div id="calendar" class="calendar"></div>
                    <!-- 凡例(今日と予定日のUIを区別するため) -->
                    <div class="calendar-legend">
                        <span class="legend-item"><span class="legend-mark legend-mark-today"></span>今日</span>
                        <span class="legend-item"><span class="legend-mark legend-mark-task"></span>予定あり</span>
                        <span class="legend-item"><span class="legend-mark legend-mark-selected"></span>選択中</span>
                    </div>
                </div>

                <!-- タイムライン(24時間 / 1時間刻み) -->
                <div class="timeline-area">
                    <!-- タイムラインのタイトル(選んだ日付で動的に変わる) -->
                    <h2 class="section-title" id="timelineTitle">タイムライン（24時間）</h2>
                    <!-- 「今日に戻す」ボタン -->
                    <div class="timeline-controls">
                        <button type="button" id="backToTodayButton" class="back-to-today-button">今日に戻す</button>
                    </div>
                    <!-- タイムライン本体。中身はscript.jsで自動生成される -->
                    <div id="timeline" class="timeline"></div>
                </div>

            </div>
        </section>

    </main>

    <!-- 外部JSファイル(script.js)を読み込む -->
    <!-- bodyの最後に置くことで、HTMLの読み込みが完了してからJSが動くようにしている -->
    <script src="script.js"></script>
</body>
</html>
